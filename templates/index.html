<!DOCTYPE html>
<html>
<head>
    <title>Fake News Generator</title>
    <style>
        body{
            font-family: Arial;
            text-align: center;
            background-color: #f4f4f4;
            padding-top: 100px;
        }

        h1{
            color: #7c1b1b;
        }

        .box{
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 60%;
            margin: auto;
            box-shadow: 0px 0px 10px gray;
        }

        button{
            padding: 10px 20px;
            font-size: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: #0056b3;
        }
    </style>
</head>

<body>

<div class="box">
    <h1.>Fake News Generator</h1>

    <h2>{{ headline }}</h2>

    <br>

    <form method="get">
        <button type="submit">Generate Another Headline</button>
    </form>

</div>

</body>
</html>
